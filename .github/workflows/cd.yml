name: CD

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        required: true
        type: choice
        options:
          - normal
          - dry-run
        default: dry-run

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.inputs.release_mode == 'normal'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets['NPM_TOKEN'] }}
        run: pnpm release

  release_dryrun:
    name: Release Dry Run
    runs-on: ubuntu-latest
    if: github.event.inputs.release_mode == 'dry-run'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Release Dry Run
        run: pnpm release:dry
